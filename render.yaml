# render.yaml — Render Blueprint for ZapShare
# This file tells Render how to build and run the app

services:
  - type: web
    name: zapshare
    runtime: python
    buildCommand: pip install -r app/requirements.txt
    startCommand: cd app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
