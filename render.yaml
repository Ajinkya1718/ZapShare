# render.yaml — Render Blueprint for ZapShare
# This file tells Render how to build and run the app

services:
  - type: web
    name: zapshare
    plan: starter
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r app/requirements.txt
    startCommand: cd app && uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /login
    autoDeploy: true
    disks:
      - name: zapshare-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATA_DIR
        value: "/var/data"
