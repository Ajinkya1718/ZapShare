<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapShare — Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="logo">⚡ ZapShare</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Register to start chatting</p>

            {% if error %}
            <div class="alert alert-error">❌ {{ error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="Choose a username" required minlength="3" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Choose a password" required minlength="4">
                </div>
                <button type="submit" class="btn btn-primary">📝 Register</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
