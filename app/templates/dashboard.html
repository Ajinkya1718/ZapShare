<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapShare</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="app-layout">

        <!-- ═══ LEFT SIDEBAR ═══ -->
        <aside class="sidebar">
            <!-- Sidebar header -->
            <div class="sidebar-header">
                <span class="sidebar-logo">⚡ ZapShare</span>
                <div class="sidebar-actions">
                    <span class="sidebar-user-badge">{{ username }}</span>
                    <a href="/logout" class="btn-outline">Logout</a>
                </div>
            </div>

            <!-- User list -->
            <div class="sidebar-users">
                {% if users|length == 0 %}
                <div class="sidebar-empty">
                    😔 No other users yet.<br>Ask a friend to register!
                </div>
                {% else %}
                {% for user in users %}
                <a href="/chat/{{ user['id'] }}"
                   class="user-row"
                   data-user-id="{{ user['id'] }}"
                   data-presence-mode="dynamic"
                   data-presence-base="Click to chat">
                    <div class="user-avatar">{{ user['username'][0]|upper }}</div>
                    <div class="user-row-info">
                        <div class="user-row-name">{{ user['username'] }}</div>
                        <div class="user-row-sub">Click to chat</div>
                    </div>
                </a>
                {% endfor %}
                {% endif %}
            </div>
        </aside>

        <!-- ═══ RIGHT PANEL — empty state ═══ -->
        <main class="chat-panel">
            <div class="chat-empty">
                <div class="chat-empty-card">
                    <div class="chat-empty-icon">💬</div>
                    <div class="chat-empty-title">ZapShare</div>
                    <div class="chat-empty-sub">Select a user from the left to start chatting</div>
                </div>
            </div>
        </main>

    </div><!-- end .app-layout -->

    <script src="/static/script.js"></script>
</body>
</html>
